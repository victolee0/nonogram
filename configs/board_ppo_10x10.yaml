# 10x10 2D Board PPO
env:
  type: "board"              # line | board
  N: 10
  reward_type: "feasibility" # sparse | feasibility
  early_stop: true
  reward_shaping: true       # 2D 보드 달성도에 따른 촘촘한 보상 가이드
  reward_shaping_weight: 0.2

device: "auto"

model:
  type: "board_cnn"          # 2D CNN 모델 사용
  hidden_dim: 256
  num_layers: 3

agent:
  type: "ppo"                # PPO 에이전트 종류
  lr: 0.0003                 # 2D 복잡도를 고려해 다소 낮게 설정
  batch_size: 128
  buffer_size: 2048          # 에피소드 수집 버퍼 크기
  train_epochs: 4
  eps_clip: 0.2
  gamma: 0.99
  gae_lambda: 0.95
  entropy_coef: 0.02         # 탐색 공간 유지를 위한 entropy 계수
  lql_weight: 0.2            # PPO 가치 네트워크의 단조성 제약 (LQL)
  lql_n_step: 3
  grad_clip: 5.0

training:
  num_episodes: 20000
  seed: 42
  log_freq: 50
