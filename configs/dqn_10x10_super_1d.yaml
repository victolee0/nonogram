# 10x10 Double DQN + Dueling optimized for 1D Line performance (Fast Convergence)
env:
  type: "line"                # 1D 줄 환경 사용
  N: 10
  reward_type: "feasibility_dense" # 다중 해 모순 문제를 완벽히 해결하는 타당성 기반 조밀한 보상
  early_stop: true
  reward_shaping: false

device: "auto"

model:
  type: "dueling"            # Dueling DQN 구조 사용
  hidden_dim: 256
  num_layers: 3

agent:
  type: "double_dqn"         # Double DQN 사용
  lr: 0.0005
  batch_size: 256
  buffer_size: 200000
  min_buffer: 5000
  target_update_freq: 1000
  train_freq: 1
  gamma: 0.99
  grad_clip: 10.0
  epsilon_start: 1.0
  epsilon_end: 0.02
  epsilon_decay: 30000       # 탐색 감쇠를 빠르게 하여 greedy 학습을 가속화
  
  # LQL (arXiv:2605.05812) - 버그 수정이 완료되어 안전하게 사용 가능
  lql_weight: 0.1            # LQL 부등식 손실 가중치
  lql_n_step: 3              # 비교할 미래 스텝 거리
  
  # PER (Prioritized Experience Replay) - 안정적 수렴 도모
  use_per: false
  per_alpha: 0.6
  per_beta: 0.4
  per_beta_increment: 0.001

training:
  num_episodes: 50000
  mode: "rl"                 # 순수 RL 탐색 (dense reward와 조합하여 자가 학습)
  towards_ratio: 0.0
  log_freq: 1000
  seed: 42
  exp_name: "double_dqn_10x10_super_1d"

  # 커리큘럼 비활성화: 초반부터 빈 라인(reveal_ratio=0)을 학습하여 즉각적인 검증 성능 향상
  curriculum:
    enabled: false
