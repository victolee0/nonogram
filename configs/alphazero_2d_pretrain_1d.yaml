env:
  N: 10

model:
  type: "alphazero_2d"
  hidden_dim: 256                # 2D model embedding size
  num_heads: 8                   # Number of heads for Row/Col attention
  num_layers: 4                  # Transformer Blocks depth

agent:
  num_simulations: 50            # MCTS simulations per step
  batch_size: 256                
  buffer_size: 100000
  min_buffer: 1000               # Wait until replay buffer has this many steps before learning
  sync_freq: 5
  lr: 0.0001                     # RL learning rate
  weight_decay: 0.0001
  num_workers: 4                 # Safe number of workers for local machine/Mac
  episodes_per_task: 1           
  max_grad_updates_per_task: 20  
  lql_weight: 0.3                # LQL weight
  lql_n_step: 5                  

mcts:
  c_puct: 3.0                    
  dirichlet_alpha: 0.15          
  dirichlet_epsilon: 0.25
  temperature: 1.0
  temp_threshold_ratio: 0.4      
  action_masking: true           

training:
  num_episodes: 50000
  seed: 42
  log_freq: 100
  value_loss_weight: 0.5         
  lql_weight: 0.2
  lql_n_step: 3
  reward_shaping: true           
  
  # 1D-Guided BC Pretraining Configuration
  pretrain_1d_model: "runs/double_dqn_10x10_super_1d_double_dqn_dueling_N10/checkpoints/best.pt" # Path to your pretrained 1D RL model
  pretrain_1d_episodes: 500       # Number of demo trajectories to generate using 1D solver
  pretrain_1d_lr: 0.0001           # BC learning rate
  pretrain_1d_hidden_dim: 256     # Must match the hidden_dim of your 1D model (e.g., dqn_10x10_super_1d.yaml hidden_dim is 256)

experiment:
  save_path: "alphazero_2d_pretrain_1d_result.pt"
  resume: false
