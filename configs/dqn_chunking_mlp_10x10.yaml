# 10x10 표준 DQN + Action Chunking 적용 (MLP 모델 기반 베이스라인)
env:
  type: "board"              # 2D 보드 환경 사용
  N: 10
  reward_type: "sparse"      # Action Chunking의 효과를 확인하기 위해 순수 Sparse Reward 셋업
  early_stop: true
  reward_shaping: false
  reward_shaping_weight: 0.0

device: "auto"

model:
  type: "mlp"                # MLP 모델 기반
  hidden_dim: 256
  num_layers: 3

agent:
  type: "dqn"
  lr: 0.001
  batch_size: 256
  buffer_size: 200000
  min_buffer: 5000
  target_update_freq: 1000
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay: 20000
  train_freq: 1
  gamma: 1.0
  grad_clip: 10.0
  
  # --- Action Chunking (Q-chunking) 설정 ---
  action_chunking: true      # 활성화
  chunk_size: 3              # MLP의 연산 한계를 고려해 3칸의 Action Chunk 예측 및 실행
  
  # --- LQL 비활성화 (Action Chunking의 n-step 스킵과 충돌/중복을 피함) ---
  lql_weight: 0.0
  lql_n_step: 3
  
  # --- PER (Prioritized Experience Replay) 활성화 ---
  use_per: true
  per_alpha: 0.6
  per_beta: 0.4
  per_beta_increment: 0.001

training:
  num_episodes: 80000
  mode: "rl"                 # 순수 RL 탐색 (Action Chunking의 탐색 효율 평가)
  towards_ratio: 0.0
  log_freq: 1000
  seed: 42
  exp_name: "dqn_chunking_mlp_10x10"
  
  # --- 역방향 커리큘럼 학습 (Reverse Curriculum) 탑재 ---
  curriculum:
    enabled: true
    type: "adaptive"
    start_ratio: auto
    end_ratio: 0.0
    decay_episodes: 30000

experiment:
  name: "dqn_chunking_mlp_10x10"
